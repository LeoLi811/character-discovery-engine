version = 1
name = "CharacterWebsite"

[setup]
script = '''
set -e

export NVM_DIR="$HOME/.nvm"
[ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

corepack enable
corepack prepare pnpm@11.10.0 --activate
pnpm install
'''

[setup.win32]
script = '''
set -e

mkdir -p "$HOME/.local/bin"
echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"
export PATH="$HOME/.local/bin:$PATH"

rm -rf /tmp/SkillSpector
git clone https://github.com/NVIDIA/SkillSpector.git /tmp/SkillSpector
cd /tmp/SkillSpector

python3 -m venv "$HOME/.skillspector-venv"
source "$HOME/.skillspector-venv/bin/activate"

make install

ln -sf "$HOME/.skillspector-venv/bin/skillspector" "$HOME/.local/bin/skillspector"

skillspector --help
'''
